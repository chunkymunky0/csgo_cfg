// execs
    // rebind all keys
        exec cfgs/keybinds
    // settings
        // prepare preferred settings
            exec cfgs/settings
        // exec preferred settings
            alias fixSettings "exec cfgs/fixSettings"

// enabling trusted mode
    trusted_launch 1

// sensitivities
    // dpi
        // 600
    // regular sensitivity
        alias regSens "sensitivity 2.5"
        // edpi: 1500
    // scoped sensitivity
        alias scopedSens "zoom_sensitivity_ratio_mouse .65"
    // scoped flick sensitivity
        alias scopedFlickSens "zoom_sensitivity_ratio_mouse 2.5"

// audio
    alias regVol "volume 0.644311"

// aliases
    // autoexec
        alias eae exec autoexec
    // fast disconnect from lobby
        alias dc "disconnect"
    // quit
        alias qiut quit
        alias quti quit
    // keybinds
        // alt keys
            // binds that require the press of an additional key to activate (prevents accidental presses and frees up keys)
            alias +altMode "exec cfgs/MultiActionBinds/altYes"
            alias -altMode "exec cfgs/MultiActionBinds/altNo"
            // scoped flick-speed toggle
                alias +scopedFlickToggle scopedFlickSens
                alias -scopedFlickToggle scopedSens
            // chats
                // kick walkbot request
                    alias kickBotPlz say_team "kick please, it's ai with aimbot"
                    alias +kickBotRequest "bind b kickBotPlz"
                    alias -kickBotRequest "unbind b; bind b buyMenuStuff"
                // get leetify
                    alias getLeetify "say get Leetify"
                    alias +getLeetifyConfirm "unbind g; bind g getLeetify"
                    alias -getLeetifyConfirm "unbind g; bind g dropBind"
                // mac-10 ragebait
                    alias ragebaitText say "If you can't kill me by the time I kill you, you didn't deserve to kill me"
                    alias +ragebait "unbind r; bind r ragebaitText"
                    alias -ragebait "unbind r; bind r +reloadBind"
                // thank you
                    alias thankYou say_team "ty"
                    alias +thankYou "unbind t; bind t thankYou"
                    alias -thankYou "unbind t; bind t messagemode"
                // nice
                    alias niceOne say_team "nice"
                    alias +niceOne "unbind n; bind n niceOne"
                    alias -niceOne "unbind n; bind n noclip"
                // nice try
                    alias niceTry say_team "nt"
                    alias +niceTry "unbind m; bind m niceTry"
                    alias -niceTry "unbind m; bind m teammenu"
        // quickswitch bind
            alias +qsw "slot3"; alias -qsw "lastinv;"

